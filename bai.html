<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced File Explorer Simulation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI}
body{height:100vh;display:flex;flex-direction:column;background:#f3f4f6}

.top{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:white;border-bottom:1px solid #ddd}
.path{font-weight:600}
.size{background:#dbeafe;padding:6px 12px;border-radius:20px;font-size:13px}

.main{flex:1;display:flex;overflow:hidden}

.sidebar{width:260px;background:#fafafa;border-right:1px solid #ddd;overflow:auto;padding:10px}
.sidebar h3{font-size:13px;color:#777;margin-bottom:10px}
.tree ul{list-style:none;padding-left:15px}
.tree-item{padding:6px;border-radius:6px;cursor:pointer}
.tree-item:hover{background:#eee}
.active{background:#dbeafe}

.content{flex:1;padding:20px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:18px}
.item{text-align:center;padding:10px;border-radius:10px;cursor:pointer}
.item:hover{background:#f1f5f9}
.icon{font-size:40px}
.meta{font-size:12px;color:#777}

.toolbar{display:flex;gap:10px;margin-bottom:15px}
button{padding:6px 10px;border:none;background:#2563eb;color:white;border-radius:6px;cursor:pointer}
button:hover{background:#1d4ed8}

.terminal{height:170px;background:#111;color:#e5e5e5;padding:10px;font-family:monospace;display:flex;flex-direction:column}
.history{flex:1;overflow:auto;font-size:13px}
.inputrow{display:flex}
.prompt{color:#4ade80;margin-right:8px}
input{flex:1;background:transparent;border:none;color:white;outline:none}
</style>
</head>
<body>

<div class="top">
<div class="path" id="path"></div>
<div class="size" id="size"></div>
</div>

<div class="main">

<div class="sidebar">
<h3>Folder Tree</h3>
<div class="tree" id="tree"></div>
</div>

<div class="content">

<div class="toolbar">
<button onclick="createFolder()">New Folder</button>
<button onclick="createFile()">New File</button>
<button onclick="renameItem()">Rename</button>
<button onclick="deleteItem()">Delete</button>
</div>

<div class="grid" id="grid"></div>

</div>

</div>

<div class="terminal">
<div class="history" id="history"></div>
<div class="inputrow">
<span class="prompt">$</span>
<input id="cmd" placeholder="type command...">
</div>
</div>

<script>

class Node{
constructor(name,type,size=0){
this.name=name
this.type=type
this.size=size
this.children=[]
this.parent=null
}

getSize(){
if(this.type==='file') return this.size
return this.children.reduce((s,c)=>s+c.getSize(),0)
}
}

const root=new Node('root','folder')
let current=root
let selected=null

function path(n){
let arr=[]
while(n){arr.unshift(n.name);n=n.parent}
return '/'+arr.join('/')
}

function find(name,node=current){
return node.children.find(x=>x.name===name)
}

function save(){
localStorage.setItem('explorer',JSON.stringify(root))
}function renderTree(node){
let html='<ul>'
if(node===root){
html+=`<li><div class="tree-item ${node===current?'active':''}" onclick="gotoNode(root)">📁 root</div>`
}
node.children.filter(c=>c.type==='folder').forEach(c=>{
html+=`<li><div class="tree-item ${c===current?'active':''}" onclick="gotoNodeByName('${c.name}')">📁 ${c.name}</div>`
html+=renderTree(c)
html+='</li>'
})
html+='</ul>'
return html
}

function renderGrid(){
let g=document.getElementById('grid')

let list=[...current.children].sort((a,b)=>a.type.localeCompare(b.type))

let html=''

list.forEach(c=>{

let icon=c.type==='folder'?'📁':'📄'

html+=`
<div class="item" onclick="selectItem('${c.name}')" ondblclick="openItem('${c.name}')">
<div class="icon">${icon}</div>
<div>${c.name}</div>
<div class="meta">${c.type==='file'?c.size+' KB':c.children.length+' items'}</div>
</div>
`

})

if(list.length===0) html='Folder empty'

g.innerHTML=html
}

function update(){

document.getElementById('path').innerText=path(current)

document.getElementById('size').innerText='Total: '+current.getSize()+' KB'

document.getElementById('tree').innerHTML=renderTree(root)

renderGrid()
}

function gotoNode(node){current=node;update()}

function gotoNodeByName(name){
let stack=[root]
while(stack.length){
let n=stack.pop()
if(n.name===name){current=n;update();return}
n.children.forEach(c=>stack.push(c))
}
}

function openItem(name){
let n=find(name)
if(n.type==='folder'){current=n;update()}
}

function selectItem(name){selected=name}

function createFolder(){
let name=prompt('Folder name')
if(!name) return
if(find(name)) return alert('exists')
let n=new Node(name,'folder')
n.parent=current
current.children.push(n)
update()
}

function createFile(){
let name=prompt('File name')
let size=parseInt(prompt('Size KB'))||0
if(find(name)) return alert('exists')
let n=new Node(name,'file',size)
n.parent=current
current.children.push(n)
update()
}

function renameItem(){
if(!selected) return
let n=find(selected)
let name=prompt('New name',n.name)
if(name) n.name=name
update()
}

function deleteItem(){
if(!selected) return
let i=current.children.findIndex(c=>c.name===selected)
if(i>-1) current.children.splice(i,1)
selected=null
update()
}

const history=document.getElementById('history')

function log(t){
let d=document.createElement('div')
d.innerText=t
history.appendChild(d)
history.scrollTop=history.scrollHeight
}

function cmdRun(text){
let a=text.split(' ')
let c=a[0]
let name=a[1]
let size=parseInt(a[2])||0

switch(c){

case 'mkdir':
let f=new Node(name,'folder')
f.parent=current
current.children.push(f)
log('folder created')
break

case 'touch':
let file=new Node(name,'file',size)
file.parent=current
current.children.push(file)
log('file created')
break

case 'cd':
if(name==='..') current=current.parent||current
else{
let n=find(name)
if(n && n.type==='folder') current=n
}
break

case 'rm':
let i=current.children.findIndex(x=>x.name===name)
if(i>-1) current.children.splice(i,1)
break

}

update()
}let input=document.getElementById('cmd')

input.addEventListener('keydown',e=>{
if(e.key==='Enter'){
log('> '+input.value)
cmdRun(input.value)
input.value=''
}
})

update()

</script>

</body>
</html>
