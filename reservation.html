<!-- ==========================
     PAGE TITLE
========================== -->

<section class="py-5">

    <div class="container">

        <h1 class="section-title">

            Đặt Bàn Trực Tuyến

        </h1>

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="reservation-box">

                    <form id="reservationForm">

                        <div class="mb-3">

                            <label class="form-label">

                                Họ và tên

                            </label>

                            <input
                                type="text"
                                id="customerName"
                                class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Số điện thoại

                            </label>

                            <input
                                type="text"
                                id="phone"
                                class="form-control">

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Ngày đặt

                                </label>

                                <input
                                    type="date"
                                    id="reservationDate"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Giờ đặt

                                </label>

                                <input
                                    type="time"
                                    id="reservationTime"
                                    class="form-control">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Số khách

                            </label>

                            <input
                                type="number"
                                min="1"
                                id="guests"
                                class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Chọn bàn trống

                            </label>

                            <select
                                id="tableId"
                                class="form-select">

                                <option value="">

                                    Đang tải dữ liệu...

                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Ghi chú

                            </label>

                            <textarea
                                id="note"
                                rows="4"
                                class="form-control"
                                placeholder="Ví dụ: Bàn gần cửa sổ, sinh nhật, cần ổ cắm laptop..."></textarea>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-main w-100">

                            <i class="fa-solid fa-calendar-check"></i>

                            Xác Nhận Đặt Bàn

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ==========================
     DANH SÁCH BÀN TRỐNG
========================== -->

<section class="pb-5">

    <div class="container">

        <h2 class="section-title">

            Bàn Đang Trống

        </h2>

        <div class="row"
             id="tableContainer">

        </div>

    </div>

</section>

<!-- ==========================
     FOOTER
========================== -->

<footer>

    <div class="container text-center">

        <h4>

            ☕ CaféBook

        </h4>

        <p>

            Đặt bàn dễ dàng - Trải nghiệm tuyệt vời.

        </p>

    </div>

</footer>

========================== -->

</div>
