<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Thực Đơn - CaféBook</title>

    <!-- Bootstrap -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- FontAwesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg custom-navbar sticky-top">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">

            ☕ CaféBook

        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="index.html">

                        Trang Chủ

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="menu.html">

                        Thực Đơn

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="reservation.html">

                        Đặt Bàn

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="admin.html">

                        Admin

                    </a>

                <li class="nav-item me-2">

    <button
        class="btn btn-warning position-relative"
        data-bs-toggle="offcanvas"
        data-bs-target="#cartCanvas">

        <i class="fa-solid fa-cart-shopping"></i>

        <span
            id="cartCount"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

            0

        </span>

    </button>

</li>

<li class="nav-item">

    <button
        id="darkModeBtn"
        class="btn btn-outline-dark">

        🌙

    </button>

</li>

            </ul>

        </div>

    </div>

</nav>

<!-- HEADER -->

<section class="py-5">

    <div class="container">

        <h1 class="section-title">

            Thực Đơn Đồ Uống

        </h1>

        <!-- FILTER -->

        <div class="filter-box mb-5">

            <div class="row g-3">

                <div class="col-lg-4">

                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Tìm kiếm đồ uống...">

                </div>

                <div class="col-lg-4">

                    <select
                        id="categoryFilter"
                        class="form-select">

                        <option value="All">

                            Tất cả danh mục

                        </option>

                        <option value="Coffee">

                            Coffee

                        </option>

                        <option value="Tea">

                            Tea

                        </option>

                        <option value="Smoothie">

                            Smoothie

                        </option>

                        <option value="Cake">

                            Cake

                        </option>

                    </select>

                </div>

                <div class="col-lg-4">

                    <select
                        id="sortSelect"
                        class="form-select">

                        <option value="default">

                            Sắp xếp

                        </option>

                        <option value="priceAsc">

                            Giá tăng dần

                        </option>

                        <option value="priceDesc">

                            Giá giảm dần

                        </option>

                        <option value="nameAsc">

                            Tên A-Z

                        </option>

                    </select>

                </div>

            </div>

        </div>

        <!-- DRINK LIST -->

        <div class="row"
             id="drinkContainer">

        </div>

        <!-- PAGINATION -->

        <nav class="mt-4">

            <ul
                id="pagination"
                class="pagination justify-content-center">

            </ul>

        </nav>

    </div>

</section>

<!-- MODAL DETAIL -->

<div
    class="modal fade"
    id="drinkModal">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5>

                    Chi Tiết Đồ Uống

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <div
                id="modalBody"
                class="modal-body">

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->

<footer>

    <div class="container text-center">

        <h4>

            ☕ CaféBook

        </h4>

        <p>

            Hương vị cà phê - Không gian kết nối.

        </p>

    </div>

</footer>

<!-- TOAST -->
 <div
    id="toastContainer"
    class="toast-container position-fixed bottom-0 end-0 p-3">

</div>

<div
    class="offcanvas offcanvas-end"
    tabindex="-1"
    id="cartCanvas">

    <div class="offcanvas-header">

        <h5>

            Giỏ Hàng

        </h5>

        <button
            class="btn-close"
            data-bs-dismiss="offcanvas">

        </button>

    </div>

    <div class="offcanvas-body">

        <div id="cartItems">

        </div>

        <hr>

        <h5>

            Tổng tiền:

            <span id="cartTotal">

                0 VNĐ

            </span>

        </h5>

        <button
            class="btn btn-success w-100 mt-3"
            onclick="checkoutCart()">

            Đặt Món

        </button>

        <button
            class="btn btn-danger w-100 mt-2"
            onclick="clearCart()">

            Xóa Tất Cả

        </button>

    </div>

</div>

<!-- JQUERY -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- BOOTSTRAP -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- JS -->

<script src="js/api.js"></script>

<script src="js/utils.js"></script>

<script src="js/validation.js"></script>

<script src="js/main.js"></script>

</body>

</html>
